name: ministerio_digital
description: "App do Ministério Digital - Orações, Bíblia, Devocionais, Comunidade e mais"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase: ^2.0.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Routing
  go_router: ^14.0.0

  # Models
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0

  # YouTube
  youtube_player_flutter: ^8.1.2

  # Audio
  just_audio: ^0.9.43

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Security
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.0.0
  phosphor_flutter: ^2.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Offline Database
  sqflite: ^2.4.0
  path: ^1.9.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.0
  share_plus: ^7.0.0
  path_provider: ^2.1.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.7.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
